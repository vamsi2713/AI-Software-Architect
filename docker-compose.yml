services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src # live-reload friendly for local dev
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

# NOTE: No neo4j/qdrant/postgres services here on purpose - those run
# on managed free tiers (AuraDB, Qdrant Cloud, Neon) to keep local RAM
# usage to just this one lightweight container.
